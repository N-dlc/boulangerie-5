<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boulangerie 5 — Rochefort-du-Gard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<!-- ===== ACCUEIL ===== -->
<div class="screen active" id="screen-accueil">
  <div class="accueil-wrapper">
    <p class="logo-tag">Artisan boulanger</p>
    <h1 class="logo-titre">Boulangerie <span>5</span></h1>
    <p class="logo-ville">Rochefort-du-Gard</p>
    <div class="ligne-deco"></div>
    <div class="btns-accueil">
      <button class="btn-principal" onclick="aller('screen-produits')">Produits</button>
      <button class="btn-principal" onclick="aller('screen-contact')">Contact</button>
      <button class="btn-principal" onclick="aller('screen-historique')">Réservations</button>
    </div>
  </div>
</div>

<!-- ===== CONTACT ===== -->
<div class="screen" id="screen-contact">
  <div class="contact-wrapper">
    <button class="btn-retour" onclick="aller('screen-accueil')">Retour</button>
    <h2 class="page-titre">Contact</h2>
    <div class="contact-bloc">
      <p class="contact-label">Email</p>
      <p class="contact-email">nino.delecluse2710@gmail.com</p>
      <div style="margin-top:1.5rem;">
        <p class="contact-label" style="margin-bottom:1rem;">Horaires d'ouverture</p>
        <div class="horaire-ligne">
          <span class="horaire-jour">Lundi – Samedi</span>
          <span>06h30 – 18h30</span>
        </div>
        <div class="horaire-ligne" style="border-bottom:none;">
          <span class="horaire-jour">Dimanche</span>
          <span>06h30 – 12h30</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== PRODUITS CATÉGORIES ===== -->
<div class="screen" id="screen-produits">
  <div class="produits-wrapper">
    <button class="btn-retour" onclick="aller('screen-accueil')">Retour</button>
    <h2 class="page-titre">Nos produits</h2>
    <div class="cats-grid">
      <button class="btn-principal" onclick="afficherCategorie('pain')">Pains</button>
      <button class="btn-principal" onclick="afficherCategorie('patisserie')">Pâtisseries</button>
      <button class="btn-principal" onclick="afficherCategorie('boisson')">Boissons</button>
    </div>
  </div>
</div>

<!-- ===== LISTE PRODUITS ===== -->
<div class="screen" id="screen-liste">
  <div style="width:100%;max-width:820px;display:flex;flex-direction:column;">
    <button class="btn-retour" onclick="aller('screen-produits')">Retour</button>
    <h2 class="page-titre" id="liste-titre"></h2>
    <div class="produits-grid" id="produits-grid"></div>
  </div>
</div>

<!-- ===== FORMULAIRE RÉSERVATION ===== -->
<div class="screen" id="screen-resa">
  <div class="resa-wrapper">
    <button class="btn-retour" onclick="aller('screen-liste')">Retour</button>
    <p class="resa-produit-tag">Réservation pour</p>
    <h2 class="page-titre" id="resa-titre"></h2>
    <div class="form-grid">
      <div class="form-row">
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" placeholder="Jean">
        </div>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" placeholder="Dupont">
        </div>
      </div>
      <div class="form-group">
        <label for="tel">Téléphone</label>
        <input type="tel" id="tel" placeholder="06 00 00 00 00">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="heure">Heure</label>
          <input type="time" id="heure" min="06:30" max="18:30">
        </div>
      </div>
      <button class="btn-envoyer" id="btn-envoyer" onclick="envoyerResa()">Confirmer la réservation</button>
      <div class="msg-ok" id="msg-ok">✓ Réservation confirmée ! Un email a été envoyé.</div>
    </div>
  </div>
</div>

<!-- ===== HISTORIQUE ===== -->
<div class="screen" id="screen-historique">
  <div class="histo-wrapper">
    <button class="btn-retour" onclick="aller('screen-accueil')">Retour</button>
    <h2 class="page-titre">Mes réservations</h2>
    <div id="histo-contenu"></div>
  </div>
</div>

<script>
  emailjs.init('6yctvBxWNUu6-w0Rb');

  const PRODUITS = {
    pain: {
      titre: 'Nos pains',
      items: [
        { nom: 'Baguette tradition', prix: '1,10 €', note: "l'unité",      img: 'https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=600&q=80', resa: false },
        { nom: 'Pain aux graines',   prix: '1,20 €', note: "l'unité",      img: 'https://images.unsplash.com/photo-1586444248902-2f64eddc13df?w=600&q=80', resa: false },
        { nom: 'Pain complet',       prix: '1,20 €', note: "l'unité",      img: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600&q=80', resa: false }
      ]
    },
    patisserie: {
      titre: 'Nos pâtisseries',
      items: [
        { nom: 'Tarte aux fraises', prix: '3,50 €', note: 'par personne', img: 'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?w=600&q=80', resa: true },
        { nom: 'Tarte au chocolat', prix: '3,50 €', note: 'par personne', img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600&q=80', resa: true },
        { nom: 'Cookie',            prix: '1,80 €', note: "l'unité",      img: 'https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=600&q=80', resa: true }
      ]
    },
    boisson: {
      titre: 'Nos boissons',
      items: [
        { nom: 'Soda', prix: '2,00 €', note: 'la bouteille', img: 'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=600&q=80', resa: false },
        { nom: 'Café', prix: '1,00 €', note: 'la tasse',     img: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600&q=80', resa: false },
        { nom: 'Thé',  prix: '3,00 €', note: 'la théière',   img: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=600&q=80', resa: false }
      ]
    }
  };

  let produitEnCours = '';
  let reservations = JSON.parse(localStorage.getItem('b5_resa') || '[]');

  function aller(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen-historique') afficherHistorique();
  }

  function afficherCategorie(cat) {
    const data = PRODUITS[cat];
    document.getElementById('liste-titre').textContent = data.titre;
    const grid = document.getElementById('produits-grid');
    grid.innerHTML = data.items.map(p => `
      <div class="produit-card">
        <img class="produit-img" src="${p.img}" alt="${p.nom}">
        <div class="produit-info">
          <p class="produit-nom">${p.nom}</p>
          <p class="produit-prix">${p.prix}</p>
          <p class="produit-note">${p.note}</p>
          ${p.resa ? `<button class="btn-reserver" onclick="ouvrirResa('${p.nom}')">Réserver</button>` : ''}
        </div>
      </div>
    `).join('');
    aller('screen-liste');
  }

  function ouvrirResa(nom) {
    produitEnCours = nom;
    document.getElementById('resa-titre').textContent = nom;
    ['prenom','nom','tel','date','heure'].forEach(id => document.getElementById(id).value = '');
    const btn = document.getElementById('btn-envoyer');
    btn.disabled = false;
    btn.textContent = 'Confirmer la réservation';
    btn.style.background = '';
    document.getElementById('msg-ok').style.display = 'none';
    document.getElementById('date').min = new Date().toISOString().split('T')[0];
    aller('screen-resa');
  }

  function envoyerResa() {
    const prenom = document.getElementById('prenom').value.trim();
    const nom    = document.getElementById('nom').value.trim();
    const tel    = document.getElementById('tel').value.trim();
    const date   = document.getElementById('date').value;
    const heure  = document.getElementById('heure').value;

    if (!prenom || !nom || !tel || !date || !heure) {
      alert('Merci de remplir tous les champs avant de confirmer.');
      return;
    }

    const btn = document.getElementById('btn-envoyer');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';

    const dateFormatee = new Date(date).toLocaleDateString('fr-FR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    emailjs.send('service_l9hy8k5', 'template_1mcdtex', {
      to_email: 'nino.delecluse2710@gmail.com',
      prenom, nom,
      telephone: tel,
      produit: produitEnCours,
      date: dateFormatee,
      heure
    }).then(() => {
      reservations.push({ produit: produitEnCours, prenom, nom, tel, date: dateFormatee, heure });
      localStorage.setItem('b5_resa', JSON.stringify(reservations));
      btn.textContent = '✓ Confirmé';
      btn.style.background = '#5a8a5a';
      document.getElementById('msg-ok').style.display = 'block';
    }).catch(() => {
      btn.disabled = false;
      btn.textContent = 'Confirmer la réservation';
      alert("Erreur lors de l'envoi. Vérifiez votre connexion et réessayez.");
    });
  }

  function afficherHistorique() {
    const el = document.getElementById('histo-contenu');
    if (!reservations.length) {
      el.innerHTML = '<p class="histo-vide">Aucune réservation pour le moment.</p>';
      return;
    }
    el.innerHTML = '<div class="histo-liste">' +
      [...reservations].reverse().map(r => `
        <div class="histo-item">
          <p class="histo-produit">${r.produit}</p>
          <p class="histo-detail">${r.prenom} ${r.nom}<br>${r.date} à ${r.heure}<br>Tél : ${r.tel}</p>
          <span class="histo-badge">✓ Confirmé</span>
        </div>
      `).join('') + '</div>';
  }
</script>
</body>
</html>
